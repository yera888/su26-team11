<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request A Swap — Swap-A-Bookaroo</title>
  <link rel="stylesheet" href="css/requestOverlay.css" />
</head>
<body class="request-page">
  <div class="request-shell">
    <div class="request-modal">
      <div class="modal-header">
        <h1>Request A Swap</h1>
        <a href="myFeed.html">Close</a>
      </div>

      <div class="request-content">
        <div class="request-panel">
          <h2>Selected Book</h2>
          <div class="book-card">
            <div class="book-cover">C</div>
            <div class="book-details">
              <h3>Circe</h3>
              <p>by Madeline Miller</p>
              <p>Fantasy • Mythology • Classics</p>
              <p>Available from Jordan Rivera</p>
            </div>
          </div>
          <p class="prompt">Are you sure you would like to request this book?</p>
          <div class="request-actions">
            <button class="btn" type="button" onclick="showMessage('Request sent!')">Yes</button>
            <a class="btn-secondary" href="myFeed.html">Keep Looking</a>
          </div>
          <p class="status-message" id="statusMessage"></p>
        </div>

        <div class="arrow" aria-hidden="true">→</div>

        <div class="request-panel">
          <div class="mystery-card">
            <div class="mystery-cover">?</div>
            <div class="mystery-copy">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showMessage(msg) {
      document.getElementById('statusMessage').textContent = msg;
    }
  </script>
</body>
</html>
